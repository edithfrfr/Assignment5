<div class="container">
  <h2>Your Transactions</h2>

  @for (tx of expenses(); track tx.id) {
    <mat-card class="tx-card">
      <div class="tx-header">
        <div class="tx-category">{{ tx.category }}</div>
        <div class="tx-amount" [class.income]="tx.type === 'Income'">${{ tx.amount }}</div>
      </div>

      <div class="tx-details">
        <p><strong>Date:</strong> {{ tx.date }}</p>
        <p><strong>Type:</strong> {{ tx.type }}</p>
        <p><strong>Notes:</strong> {{ tx.notes || '—' }}</p>
      </div>

      <div class="tx-actions">
        <button mat-button color="primary" (click)="edit(tx.id)">Edit</button>
        <button mat-button color="warn" (click)="delete(tx.id)">Delete</button>
      </div>
    </mat-card>
  }
</div>
